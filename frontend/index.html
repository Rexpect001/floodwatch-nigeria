<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#163E6F" />
    <meta name="description" content="HazardWatch Nigeria — Official Multi-Hazard Early Warning System (NEMA/NIHSA/NiMet)" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <!-- OpenStreetMap / Leaflet preconnect -->
    <link rel="preconnect" href="https://tile.openstreetmap.org" />

    <!-- Prevent flash of unstyled content on slow networks -->
    <style>
      body { margin: 0; background: #F6F7F9; font-family: 'Segoe UI', system-ui, sans-serif; }
      #root { min-height: 100vh; }
      .initial-loader {
        display: flex; align-items: center; justify-content: center;
        height: 100vh; flex-direction: column; gap: 16px; color: #3D4757;
        font-size: 0.9rem;
      }
      .initial-loader__spinner {
        width: 36px; height: 36px; border: 3px solid #D9DEE5;
        border-top-color: #205493; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <title>HazardWatch Nigeria</title>
  </head>
  <body>
    <div id="root">
      <!-- Shown before React hydrates -->
      <div class="initial-loader" aria-label="Loading HazardWatch Nigeria" role="status">
        <div class="initial-loader__spinner" aria-hidden="true"></div>
        <span>HazardWatch Nigeria…</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
