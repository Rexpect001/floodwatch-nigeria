# FloodWatch Nigeria — Nginx reverse proxy + PWA static file server
# Handles: SSL termination, API proxy, PWA SPA routing, compression, security headers

# Upstream FastAPI
upstream api {
    server api:8000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.floodwatch.ng floodwatch.ng www.floodwatch.ng;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS main server
server {
    listen 443 ssl http2;
    server_name floodwatch.ng www.floodwatch.ng api.floodwatch.ng;

    ssl_certificate     /etc/letsencrypt/live/floodwatch.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/floodwatch.ng/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            DENY                                  always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header Referrer-Policy            strict-origin-when-cross-origin       always;
    add_header Permissions-Policy         "geolocation=(self), camera=()"       always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' blob: https://api.mapbox.com; \
         style-src 'self' 'unsafe-inline' https://api.mapbox.com; \
         img-src 'self' data: blob: https://*.mapbox.com https://*.openstreetmap.org; \
         connect-src 'self' https://api.mapbox.com https://events.mapbox.com wss:; \
         worker-src 'self' blob:; \
         font-src 'self';"
        always;

    # Gzip compression (augments FastAPI GZipMiddleware for static assets)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # ── PWA Service Worker — must NOT be cached ──────────────────
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma no-cache;
        expires 0;
        try_files $uri =404;
    }

    # ── PWA Manifest ─────────────────────────────────────────────
    location = /manifest.json {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ── Offline maps GeoJSON — long cache (pre-baked at build) ───
    location /maps/ {
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=3600";
        try_files $uri =404;
    }

    # ── Static assets (hashed filenames — cache aggressively) ────
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── Icons & screenshots ───────────────────────────────────────
    location /icons/ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # ── API proxy → FastAPI ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Rate limiting: 30 req/s per IP (burst 60 for map tile loading)
        limit_req zone=api burst=60 nodelay;

        # Timeouts
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 5s;

        # Cache-Control passthrough from FastAPI
        proxy_pass_header  Cache-Control;
    }

    # ── Health check (no logging) ─────────────────────────────────
    location = /health {
        proxy_pass http://api/health;
        access_log off;
    }

    # ── SPA fallback — all other routes → index.html ─────────────
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}

# Rate limit zones (define in http context — set via nginx.conf main)
# These are referenced above and must exist in the http{} block.
# In the container, include this file as /etc/nginx/conf.d/default.conf
# and ensure the main /etc/nginx/nginx.conf has:
#   limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
